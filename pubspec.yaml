name: ainotes
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.1+2

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  simple_ripple_animation: ^0.0.9
  flutter_screenutil: ^5.9.0
  flutter_svg: ^2.0.10+1
  get: ^4.6.6
  get_storage: ^2.1.1
  floating_draggable_widget: ^2.1.5
  dart_openai: ^5.1.0
  http: ^1.6.0
  flutter_spinkit: ^5.2.1
  sqflite: ^2.3.3+1
  fluttertoast: ^9.0.0
  permission_handler: ^11.3.1
  record: ^6.2.0
  shared_preferences: ^2.2.3
  search_choices: ^2.2.7
  image_picker: ^1.0.4
  share_plus: ^12.0.1
  google_mlkit_text_recognition: ^0.13.0
  in_app_purchase: ^3.2.0
  gradient_borders: ^1.0.0
  animate_gradient: ^0.0.3
  google_mobile_ads: ^7.0.0
  reorderable_grid_view: ^2.2.8
  intl: ^0.17.0
  url_launcher: ^6.3.0
  device_info_plus:
  path_provider: ^2.1.5
  flutter_staggered_grid_view: ^0.7.0
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  change_app_package_name: ^1.5.0
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
flutter_launcher_icons:
  image_path_android: "assets/img_icon.png"
  image_path_ios: "assets/img_icon.png"
  android: "launcher_icon" # can specify file name here e.g. "ic_launcher"
  ios: true # can specify file name here e.g. "My-Launcher-Icon"
  adaptive_icon_background: "#7209B7" # only available for Android 8.0 devices and above
  adaptive_icon_foreground: "assets/img_icon.png" # only available for Android 8.0 devices and above
  adaptive_icon_foreground_inset: 16 # only available for Android 8.0 devices and above
  adaptive_icon_monochrome: "assets/img_icon.png" # only available for Android 13 devices and above
  min_sdk_android: 26 # android min sdk min:16, default 21
  remove_alpha_ios: true
  background_color_ios: "#7209B7"
  web:
    generate: true
    image_path: "assets/img_icon.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
flutter_native_splash:
  # Background color for all platforms (except Android 12+)
  # This is REQUIRED if you don't use background_image
  color: "#7209B7"  # Your color - change to your preference

  # The splash screen image (your app icon or custom splash image)
  # Should be sized for 4x pixel density (e.g., 512x512 or larger)
  image: assets/img_icon.png

  # Optional: Dark mode variant
  # color_dark: "#042a49"
  # image_dark: assets/splash_dark.png

  # Optional: Branding image at bottom (like a logo or text)
  # branding: assets/branding.png
  # branding_mode: bottom

  # Android 12+ specific configuration (IMPORTANT!)
  android_12:
    # Background color for Android 12+
    color: "#7209B7"  # Match your main color

    # Center splash image for Android 12+
    # If not specified, launcher icon is used
    # With icon_background_color: 960×960 px (fit within circle 640px diameter)
    # Without icon_background_color: 1152×1152 px (fit within circle 768px diameter)
    # image: assets/splashscreen.png

    # Optional: Background color behind the icon (creates a circle)
    icon_background_color: "#FFFFFF"

    # Optional: Dark mode for Android 12+
    # color_dark: "#042a49"
    # image_dark: assets/splash_dark.png
    # icon_background_color_dark: "#000000"

  # Platform-specific settings
  android: true
  ios: true
  web: false  # Set to true if you want web splash

  # Fullscreen (hides notification bar on Android, iOS hides by default)
  fullscreen: true

  # Image positioning
  android_gravity: center
  ios_content_mode: center


flutter:

  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/images/icons/
    - assets/images/aiToolsIcons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
    - family: PoppinsSemiBold
      fonts:
        - asset: assets/fonts/Poppins-SemiBold.ttf
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
    - family: MontserratRegular
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
