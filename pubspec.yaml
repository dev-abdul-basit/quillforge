name: ainotes
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  simple_ripple_animation: ^0.0.9
  flutter_screenutil: ^5.9.0
  flutter_svg: ^2.0.10+1
  get: ^4.6.6
  get_storage: ^2.1.1
  floating_draggable_widget: ^2.1.5
  dart_openai: ^5.1.0
  http: ^1.2.1
  flutter_spinkit: ^5.2.1
  sqflite: ^2.3.3+1
  fluttertoast: ^9.0.0
  permission_handler: ^11.3.1
  record: ^6.2.0
  shared_preferences: ^2.2.3
  search_choices: ^2.2.7
  image_picker: ^1.0.4
  share_plus: ^12.0.1
  google_mlkit_text_recognition: ^0.13.0
  in_app_purchase: ^3.2.0
  gradient_borders: ^1.0.0
  animate_gradient: ^0.0.3
  google_mobile_ads: ^7.0.0
  reorderable_grid_view: ^2.2.8
  intl: ^0.17.0
  change_app_package_name: ^1.2.0
  url_launcher: ^6.3.0
  device_info_plus:
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/icons/
    - assets/images/aiToolsIcons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
    - family: PoppinsSemiBold
      fonts:
        - asset: assets/fonts/Poppins-SemiBold.ttf
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
    - family: MontserratRegular
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
